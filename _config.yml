title: "Duri's Tech Blog"
description: "데이터 엔지니어링과 머신러닝에 열정을 가진 개발자의 기술 블로그"
url: "https://duri-wip.github.io"
baseurl: ""

# 작성자 정보
author:
  name: "Duri"
  title: "Data Engineer & ML Developer"
  bio: "데이터 엔지니어링과 머신러닝에 열정을 가진 개발자입니다. 새로운 기술을 배우고 공유하는 것을 좋아합니다."
  avatar: "/assets/images/avatar.jpg"
  email: "duri@example.com"
  github: "duri-wip"
  linkedin: "duri"
  twitter: "duri_dev"

# 블로그 설정
banner_image: "/assets/images/banner.jpg"
banner_text: "귀여운 이미지를 넣어주세요 ✨"

# Jekyll 설정
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# 플러그인
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# 빌드 설정
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - vendor
  - .bundle

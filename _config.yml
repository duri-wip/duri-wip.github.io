title: "Duri's Work In Progress"
description: "열심히 배우고 있습니다."
url: "https://duri-wip.github.io"
baseurl: ""

# 작성자 정보
author:
  name: "Duri"
  title: "˗ˏˋ ⋆｡𖦹 ˚ 𓇼 ˚｡⋆ ❀˖°"
  bio: "데이터 엔지니어링과 머신러닝에 열정을 가진 개발자입니다. 새로운 기술을 배우고 공유하는 것을 좋아합니다."
  avatar: "/assets/images/avatar.png"
  email: "8s.eow.ooc@gmail.com"
  github: "duri-wip"

# 블로그 설정
banner_image: "/assets/images/banner.jpg"
banner_text: "귀여운 이미지를 넣어주세요 ✨"

# Jekyll 설정
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# 컬렉션 설정
collections:
  projects:
    output: true
    permalink: /:collection/:name/
  pages:
    output: true
    permalink: /:name/
  topics:
    output: true
    permalink: /topics/:name/

# 프로젝트 포스트를 컬렉션으로 인식
defaults:
  - scope:
      path: "_posts/projects"
      type: "posts"
    values:
      layout: "post"
      collection: "projects"

# 플러그인
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-archives

# 페이지네이션 설정
paginate: 10
paginate_path: "/page:num/"

# 아카이브 설정
topic_archive:
  type: liquid
  path: /topics/
tag_archive:
  type: liquid
  path: /tags/
project_archive:
  type: liquid
  path: /projects/

# 빌드 설정
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - vendor
  - .bundle
